<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Kayıt Formu</title>
    <!-- Google Fonts: Outfit for an ultra-modern aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0b0f19;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.25);
        --secondary: #ec4899;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color);
        color: var(--text-main);
        overflow: hidden;
        position: relative;
      }

      /* Animated decorative blurred blobs in the background */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        z-index: 0;
        opacity: 0.5;
        animation: float 20s infinite alternate ease-in-out;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--primary), transparent 70%);
      }
      .blob-2 {
        bottom: -10%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--secondary), transparent 70%);
        animation-delay: -10s;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(60px, -60px) scale(1.1); }
      }

      .form-container {
        position: relative;
        z-index: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        padding: 48px 40px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 2.4rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 10px;
        background: linear-gradient(to right, #ffffff, #a5b4fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .header p {
        color: var(--text-muted);
        font-size: 1rem;
        font-weight: 300;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .input-group {
        position: relative;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        transition: all 0.3s ease;
      }

      .input-group:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-glow);
        background: rgba(0, 0, 0, 0.4);
      }

      .input-group input {
        width: 100%;
        padding: 26px 20px 10px 20px;
        background: transparent;
        border: none;
        font-family: inherit;
        font-size: 1.05rem;
        color: var(--text-main);
        outline: none;
      }

      .input-group label {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 1.05rem;
        pointer-events: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .input-group input:focus ~ label, 
      .input-group input:not(:placeholder-shown) ~ label {
        top: 14px;
        font-size: 0.75rem;
        font-weight: 500;
      }

      .input-group input:focus ~ label {
        color: var(--primary);
      }

      button {
        padding: 18px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        font-family: inherit;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 12px;
        box-shadow: 0 10px 20px -5px var(--primary-glow);
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      button > span {
        position: relative;
        z-index: 1;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -5px rgba(236, 72, 153, 0.4);
      }

      button:hover::before {
        opacity: 1;
      }

      button:active {
        transform: translateY(1px);
        box-shadow: 0 5px 15px -5px var(--primary-glow);
      }
    </style>
  </head>
  <body>
    <!-- Decorative Glowing Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="form-container">
      <div class="header">
        <h1>Hoş Geldiniz</h1>
        <p>Lütfen bilgilerinizi girerek devam edin</p>
      </div>

      <form action="">
        <div class="input-group">
          <!-- The placeholder=" " is critical for the floating label CSS trick to work -->
          <input type="text" name="name" id="name" placeholder=" " required />
          <label for="name">Adınız</label>
        </div>
        <div class="input-group">
          <input type="email" name="email" id="email" placeholder=" " required />
          <label for="email">E-posta Adresiniz</label>
        </div>
        <div class="input-group">
          <input type="password" name="password" id="password" placeholder=" " required />
          <label for="password">Şifreniz</label>
        </div>
        <button type="submit"><span>Giriş Yap / Kaydol</span></button>
      </form>
    </div>
  </body>
</html>
