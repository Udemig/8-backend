<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0c0e12;
        --bg-card: #141820;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8eaed;
        --muted: #8b93a1;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --input-bg: #0c0f14;
        --glow: rgba(59, 130, 246, 0.15);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--text);
        background: radial-gradient(ellipse 120% 80% at 50% -20%, var(--glow), transparent 50%),
          radial-gradient(ellipse 80% 50% at 100% 100%, rgba(139, 92, 246, 0.08), transparent 45%),
          var(--bg-deep);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }

      .page-intro {
        text-align: center;
        margin-bottom: 1.75rem;
        max-width: 28rem;
      }

      .page-intro h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.5rem, 4vw, 1.875rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .page-intro p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.5;
      }

      .form-card {
        width: 100%;
        max-width: 22rem;
        padding: 1.75rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      }

      .form-card form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .form-card label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      .form-card input {
        width: 100%;
        padding: 0.75rem 0.9rem;
        font: inherit;
        font-size: 0.9375rem;
        color: var(--text);
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .form-card input::placeholder {
        color: var(--muted);
        opacity: 0.85;
      }

      .form-card input:hover {
        border-color: rgba(255, 255, 255, 0.12);
      }

      .form-card input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--glow);
      }

      .form-card button {
        margin-top: 0.25rem;
        padding: 0.8rem 1rem;
        font: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(180deg, var(--accent) 0%, #2563eb 100%);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
      }

      .form-card button:hover {
        background: linear-gradient(180deg, var(--accent-hover) 0%, var(--accent) 100%);
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
      }

      .form-card button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="page-intro">
      <h1>Hello World</h1>
      <p>Lütfen formu doldurunuz.</p>
    </div>

    <div class="form-card">
      <form>
        <div class="field">
          <label for="name">İsim</label>
          <input id="name" type="text" name="name" placeholder="Adınızı girin" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">E-posta</label>
          <input id="email" type="email" name="email" placeholder="E-postanızı girin" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Şifre</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="Şifrenizi girin"
            autocomplete="new-password"
          />
        </div>
        <button type="submit">Gönder</button>
      </form>
    </div>
  </body>
</html>
